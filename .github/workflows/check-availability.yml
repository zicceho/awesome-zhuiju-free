name: Check availability

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "resources/resources.json"
      - "scripts/check-availability.mjs"
      - ".github/workflows/check-availability.yml"

permissions:
  contents: write

concurrency:
  group: check-availability
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check featured resources
        run: node scripts/check-availability.mjs
      - name: Validate data
        run: node scripts/validate-data.mjs
      - name: Commit availability results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md reports/availability.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update daily availability"
          git push
