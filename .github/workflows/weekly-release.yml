name: Weekly release

on:
  schedule:
    - cron: "0 14 * * 0"
  workflow_dispatch:
    inputs:
      report_date:
        description: "周报日期，留空则使用当前北京时间日期"
        required: false
        type: string
      update_existing:
        description: "如果本周 Release 已存在，是否更新正文"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: weekly-release
  cancel-in-progress: false

jobs:
  publish-weekly-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate data
        run: node scripts/validate-data.mjs

      - name: Generate release notes
        id: release
        env:
          REPORT_DATE: ${{ github.event.inputs.report_date }}
          RELEASE_NOTES_PATH: ${{ runner.temp }}/weekly-release.md
        run: node scripts/generate-weekly-release.mjs

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          TITLE: ${{ steps.release.outputs.title }}
          NOTES_PATH: ${{ steps.release.outputs.notes_path }}
          UPDATE_EXISTING: ${{ github.event.inputs.update_existing || 'false' }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            if [ "$UPDATE_EXISTING" = "true" ]; then
              gh release edit "$TAG" --title "$TITLE" --notes-file "$NOTES_PATH"
            else
              echo "Release $TAG already exists. Skipping."
            fi
          else
            gh release create "$TAG" --title "$TITLE" --notes-file "$NOTES_PATH"
          fi
